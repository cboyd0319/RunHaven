name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Rust 1.96.0 on macOS 26
    runs-on: macos-26

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt clippy
      - run: cargo +1.96.0 fmt --check
      - run: cargo +1.96.0 test --locked
      - run: cargo +1.96.0 clippy --all-targets -- -D warnings
      - run: cargo +1.96.0 run --locked --bin runhaven-check-pins
      - run: cargo +1.96.0 build --locked
